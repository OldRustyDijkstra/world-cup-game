name: Deploy to Azure Static Web Apps

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to deploy'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
          - both

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-preview:
    name: Deploy → Preview
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.environment == 'preview' || inputs.environment == 'both' }}
    environment:
      name: preview
      url: https://gray-field-0dbb8c600-preview.eastasia.7.azurestaticapps.net
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy to Preview
        run: swa deploy ./dist --env preview
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.SWA_CLI_DEPLOYMENT_TOKEN }}

  deploy-production:
    name: Deploy → Production
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.environment == 'production' || inputs.environment == 'both' }}
    environment:
      name: production
      url: https://gray-field-0dbb8c600.7.azurestaticapps.net
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy to Production
        run: swa deploy ./dist --env production
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.SWA_CLI_DEPLOYMENT_TOKEN }}
