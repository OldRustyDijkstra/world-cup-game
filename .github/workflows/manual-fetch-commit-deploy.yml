name: Manual Fetch, Commit, and Deploy

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-commit-deploy:
    name: Fetch results, commit changes, and deploy all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch results
        run: npm run fetch-results

      - name: Commit updated results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- src/actualResults.json; then
            echo "No changes in src/actualResults.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/actualResults.json
          git commit -m "chore: refresh world cup results"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy all
        run: npm run deploy:all
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.SWA_CLI_DEPLOYMENT_TOKEN }}
